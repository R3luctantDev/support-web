<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Support Inquiry Web</title>

  <link rel="stylesheet" href="supportWeb.css">
  <link rel="icon" type="image/svg+xml" href="..assets/fansly_logo.png">
  <link rel="stylesheet" href="../shared/shared.css">
</head>

<body>
  <div id="toolNav"></div>
  
  <h1>Support Inquiry Web</h1>
  <p>Move the "spider" toward the pillar that best fits the scenario.</p>

  <div class="web" id="web">

    <svg class="radar-fill" viewBox="0 0 700 700">
      <polygon id="radarShape" points="" />
    </svg>

    <div class="spoke" style="transform: rotate(0deg);"></div>
    <div class="spoke" style="transform: rotate(45deg);"></div>
    <div class="spoke" style="transform: rotate(90deg);"></div>
    <div class="spoke" style="transform: rotate(135deg);"></div>
    <div class="spoke" style="transform: rotate(180deg);"></div>
    <div class="spoke" style="transform: rotate(225deg);"></div>
    <div class="spoke" style="transform: rotate(270deg);"></div>
    <div class="spoke" style="transform: rotate(315deg);"></div>

    <div class="label trust-label" 
         data-tooltip="Examples: model release, applications, banned accounts"
         data-category="trust">Trust & Safety</div>
    <div class="label account-label" 
         data-tooltip="Examples: compromised accounts, account restoration, username or email changes, locating lost accounts"
         data-category="account">Account Changes</div>
    <div class="label billing-label" 
         data-tooltip="Examples: payment issues, delayed transactions, refund requests"
         data-category="billing">Billing</div>
    <div class="label payouts-label" 
         data-tooltip="Examples: invoice requests, payout method inquiries, delayed payouts"
         data-category="payouts">Payouts</div>
    <div class="label technical-label" 
         data-tooltip="Examples: troubleshooting, how a feature works, intended behavior"
         data-category="technical">Technical/How To</div>
    <div class="label creator-label" 
         data-tooltip="Examples: partnership inquiries, marketing related"
         data-category="creator">Creator Success</div>
    <div class="label privacy-label" 
         data-tooltip="Examples: DMCA, delete my data, copy of data"
         data-category="privacy">Privacy</div>
    <div class="label legal-label" 
         data-tooltip="Examples: law enforcement requests, allegations of discrimination"
         data-category="legal">Legal</div>

    <div class="center"></div>
    <div id="spider">💙</div>
  </div>

  <br>
  <br>
  <br>

  <button class="reset-button" onclick="resetMarker()">Reset</button>

  <script src="supportWeb.js"></script>
  <script src="../shared/nav.js"></script>
</body>
</html>
