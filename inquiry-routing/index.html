<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Troubleshooting Web</title>

  <link rel="stylesheet" href="tsWeb.css">
  <link rel="icon" type="image/svg+xml" href="../assets/fansly_logo.png">
  <link rel="stylesheet" href="../shared/shared.css">
</head>

<body>
  <nav class="tool-nav">
    <label for="toolSelect">Training tool:</label>

    <select id="toolSelect" onchange="goToTool(this.value)">
        <option value="/">Landing Page</option>
        <option value="/inquiry-routing/">Inquiry Routing Web</option>
        <option value="/troubleshooting/">Troubleshooting Web</option>
    </select>
    </nav>
  
  <h1>Troubleshooting Web</h1>
  <p>Move the "spider" toward the concept that best fits the scenario.</p>

  <div class="web" id="web">

    <svg class="radar-fill" viewBox="0 0 700 700">
      <polygon id="radarShape" points="" />
    </svg>

    <div class="spoke" style="transform: rotate(0deg);"></div>
    <div class="spoke" style="transform: rotate(24deg);"></div>
    <div class="spoke" style="transform: rotate(48deg);"></div>
    <div class="spoke" style="transform: rotate(72deg);"></div>
    <div class="spoke" style="transform: rotate(96deg);"></div>
    <div class="spoke" style="transform: rotate(120deg);"></div>
    <div class="spoke" style="transform: rotate(144deg);"></div>
    <div class="spoke" style="transform: rotate(168deg);"></div>
    <div class="spoke" style="transform: rotate(192deg);"></div>
    <div class="spoke" style="transform: rotate(216deg);"></div>
    <div class="spoke" style="transform: rotate(240deg);"></div>
    <div class="spoke" style="transform: rotate(264deg);"></div>
    <div class="spoke" style="transform: rotate(288deg);"></div>
    <div class="spoke" style="transform: rotate(312deg);"></div>
    <div class="spoke" style="transform: rotate(336deg);"></div>

    <div class="label login-label" 
         data-tooltip="Examples: "
         data-category="login">Login</div>
    <div class="label display-label" 
         data-tooltip="Examples: "
         data-category="display">Display/UI</div>
    <div class="label stats-label" 
         data-tooltip="Examples: "
         data-category="stats">Statistics</div>
    <div class="label fyp-label" 
         data-tooltip="Examples: "
         data-category="fyp">Algorithm/FYP</div>  
    <div class="label live-label" 
         data-tooltip="Examples: "
         data-category="live">Live Streaming</div>
    <div class="label media-label" 
         data-tooltip="Examples: "
         data-category="media">Media Visibility</div>
    <div class="label uploads-label" 
         data-tooltip="Examples: "
         data-category="uploads">Uploads</div>
    <div class="label posts-label" 
         data-tooltip="Examples: "
         data-category="posts">Posting</div>
    <div class="label apps-label" 
         data-tooltip="Examples: "
         data-category="apps">Applications</div>
    <div class="label money-label" 
         data-tooltip="Examples: "
         data-category="money">Payments/Payouts</div>
    <div class="label messaging-label" 
         data-tooltip="Examples: DMs, mass messages, automated messages"
         data-category="messaging">Messaging</div>
    <div class="label notifs-label" 
         data-tooltip="Examples: "
         data-category="notifs">Notifications</div>
    <div class="label emails-label" 
         data-tooltip="Examples: "
         data-category="emails">Emails</div>
    <div class="label management-label" 
         data-tooltip="Examples: "
         data-category="management">Management Sessions</div>
    <div class="label nonFansly-label" 
         data-tooltip="Examples: "
         data-category="nonFansly">Non Fansly</div>

    <div class="center"></div>
    <div id="spider">💙</div>
  </div>

  <br>
  <br>
  <br>

  <button class="reset-button" onclick="resetMarker()">Reset</button>

  <script src="tsWeb.js"></script>
  <script src="../shared/nav.js"></script>
</body>
</html>
